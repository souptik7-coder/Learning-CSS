<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="feedback.css">
</head>
<body>
    <form action="/action">
    <h1>Feedback Form</h1>
    <section>
    <label for="name">Name:</label>
    <input type="text" placeholder="enter your name" id="name" name="name">
    <br><br>
    <label for="email">Email:</label>
    <input type="text" placeholder="enter your email" id="email" name="email">
    <br><br>
    <label for="message">Message</label>
    <textarea id="message" placeholder="enter your message" name="message"></textarea>
    <br><br>
    </section>
    <footer>
    <h4>Rate us our of 5:</h4>
    <input type="radio" id="one" name="check" value="one">
    <label for="one">1</label>
    <br>
    <input type="radio" id="two" name="check" value="two">
    <label for="two">2</label>
    <br>
    <input type="radio" id="three" name="check" value="three">
    <label for="three">3</label>
    <br>
    <input type="radio" id="four" name="check" value="four">
    <label for="four">4</label>
    <br>
    <input type="radio" id="five" name="check" value="five">
    <label for="five">5</label>
    <br><br>
    <button type="submit">Send your message!</button>
    </footer>
    </form>
</body>
</html>
